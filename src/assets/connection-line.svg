<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Straight line connecting the dots -->
  <line class="connection-svg-line" 
        x1="15" y1="50" x2="85" y2="50"
        stroke="currentColor"
        stroke-width="6"
        stroke-linecap="round" />
  
  <!-- Left dot -->
  <circle class="connection-svg-circle" cx="15" cy="50" r="12" fill="currentColor" />
  
  <!-- Right dot -->
  <circle class="connection-svg-circle" cx="85" cy="50" r="12" fill="currentColor" />
</svg>

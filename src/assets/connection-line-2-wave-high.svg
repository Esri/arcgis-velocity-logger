<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Heart pulse line connecting the dots -->
  <path class="connection-svg-line" 
        d="M 10 50 
           Q 20 0, 30 50
           Q 40 100, 50 50
           Q 60 0, 70 50
           Q 80 100, 90 50"
        fill="none"
        stroke="currentColor"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round" />
  
  <!-- Left dot -->
  <circle class="connection-svg-circle" cx="10" cy="50" r="10" fill="currentColor" />
  
  <!-- Right dot -->
  <circle class="connection-svg-circle" cx="90" cy="50" r="10" fill="currentColor" />
</svg>
